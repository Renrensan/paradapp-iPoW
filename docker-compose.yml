services:
  # --- Local Operators ---
  hedera-operator:
    container_name: hedera-operator
    image: renrensan/paradapp-interoperability-service
    build: .
    command: ["--mode", "operator", "--src", "Hedera"]
    env_file: .env
    environment:
      SQLITE_DB_DIR: "/app/data"
    volumes:
      - hedera_data:/app/data
    restart: unless-stopped

  ethereum-operator:
    container_name: ethereum-operator
    image: renrensan/paradapp-interoperability-service
    command: ["--mode", "operator", "--src", "Ethereum"]
    env_file: .env
    environment:
      SQLITE_DB_DIR: "/app/data"
    volumes:
      - ethereum_data:/app/data
    restart: unless-stopped

  bridge-hedera-eth:
    container_name: bridge-hedera-eth
    image: renrensan/paradapp-interoperability-service
    command: ["--mode", "bridge", "--src", "Hedera", "--dst", "Ethereum"]
    env_file: .env
    environment:
      SQLITE_DB_DIR: "/app/data"
    restart: unless-stopped

  # --- Future Network (Example) ---
  # bridge-hedera-base:
  #   container_name: bridge-hedera-base
  #   image: renrensan/paradapp-interoperability-service
  #   command: ["--mode", "bridge", "--src", "Hedera", "--dst", "Base"]
  #   env_file: .env
  #   environment:
  #     SQLITE_DB_DIR: "/app/data"
  #   restart: unless-stopped

volumes:
  hedera_data:
  ethereum_data:
