[tools]
rust = "1.91.1"

[env]
_.file = ".env"

[tasks.build]
description = "Build all operator binaries"
run = "cargo build --release"

[tasks.build-debug]
description = "Build all operator binaries in debug mode"
run = "cargo build"

[tasks.run-all]
description = "Run monolith operator"
run = "cargo run -- --mode all"

[tasks.run-hedera]
description = "Run Hedera operator. Supports optional watch sources."
run = '''
if [ "$#" -gt 0 ]; then
  cargo run -- --mode operator --src hedera --watch-sources "$@"
else
  cargo run -- --mode operator --src hedera
fi
'''

[tasks.run-ethereum]
description = "Run Ethereum operator. Supports optional watch sources."
run = '''
if [ "$#" -gt 0 ]; then
  cargo run -- --mode operator --src eth --watch-sources "$@"
else
  cargo run -- --mode operator --src eth
fi
'''

[tasks.run-custom]
description = "Run any operator with custom settings. Usage: mise run run-custom <src> <watch...>"
run = '''
SRC="$1"
shift || true

if [ "$#" -gt 0 ]; then
  cargo run -- --mode operator --src "$SRC" --watch-sources "$@"
else
  cargo run -- --mode operator --src "$SRC"
fi
'''

[tasks.docker-build]
description = "Build Docker image for paradapp operator"
run = "docker build -t renrensan/paradapp-interoperability-service ."

[tasks.docker-compose-up]
description = "Start services with Docker Compose"
run = "docker compose up -d"

[tasks.docker-compose-down]
description = "Stop services and remove containers"
run = "docker compose down"

[tasks.docker-compose-logs]
description = "Follow logs for all services"
run = "docker compose logs -f"

[tasks.docker-push]
description = "Push to dockerhub repository"
run = "docker push renrensan/paradapp-interoperability-service"

[tasks.fmt]
description = "Check Rust code formatting"
run = "cargo fmt"

[tasks.clippy]
description = "Run Rust linter (clippy)"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.lint]
description = "Run all Rust linters"
depends = ["fmt", "clippy"]
