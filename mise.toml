[tools]
rust = "1.91.1"

[env]
_.file = ".env"

[tasks.build]
description = "Build all operator binaries"
run = "cargo build --release"

[tasks.run-all]
description = "Run monolith operator (All networks, all engines)"
run = "cargo run -- --mode monolith"


# --- Network Specific Helpers ---

[tasks.run-hedera]
description = "Usage: [ENGINE=...] mise run run-hedera [watch...]. Engines: all, approver, streamer, converter."
run = '''
bash -c '
E_FLAG=${ENGINE:-all}
if [ "$#" -gt 0 ]; then
    cargo run -- --mode operator --src hedera --engine "$E_FLAG" --watch-sources "$@"
else
    cargo run -- --mode operator --src hedera --engine "$E_FLAG"
fi
' -- "$@"
'''

[tasks.run-ethereum]
description = "Usage: [ENGINE=...] mise run run-ethereum [watch...]. Engines: all, approver, streamer, converter."
run = '''
bash -c '
E_FLAG=${ENGINE:-all}
if [ "$#" -gt 0 ]; then
    cargo run -- --mode operator --src eth --engine "$E_FLAG" --watch-sources "$@"
else
    cargo run -- --mode operator --src eth --engine "$E_FLAG"
fi
' -- "$@"
'''

[tasks.run-custom]
description = "Usage: [ENGINE=...] mise run run-custom <src> [watch...]. Engines: all, approver, streamer, converter."
run = '''
bash -c '
E_FLAG=${ENGINE:-all}
SRC="$1"
shift || true
if [ "$#" -gt 0 ]; then
    cargo run -- --mode operator --src "$SRC" --engine "$E_FLAG" --watch-sources "$@"
else
    cargo run -- --mode operator --src "$SRC" --engine "$E_FLAG"
fi
' -- "$@"
'''

# --- Docker & CI/CD ---

[tasks.docker-build]
description = "Build Docker image"
run = "docker build -t renrensan/paradapp-interoperability-service ."

[tasks.docker-push]
description = "Push to dockerhub repository"
run = "docker push renrensan/paradapp-interoperability-service"

# --- Quality Control ---

[tasks.fmt]
description = "Check Rust code formatting"
run = "cargo fmt"

[tasks.clippy]
description = "Run Rust linter"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.lint]
description = "Run all Rust linters"
depends = ["fmt", "clippy"]